name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Test
        run: npm test --if-present
      
      - name: Build check
        run: npm run build --if-present

      - name: Verify package can be packed
        run: npm pack --dry-run
      
      - name: Verify MCP server starts
        env:
          KREA_API_KEY: ci-smoke-test-key
        run: |
          timeout 5s node src/index.js >/tmp/krea-mcp.stdout 2>/tmp/krea-mcp.stderr
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat /tmp/krea-mcp.stderr
            exit "$status"
          fi
